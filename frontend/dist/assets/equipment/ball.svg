<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Fußball mit vereinfachtem Fünfeck-Muster -->
  <circle cx="20" cy="20" r="18" fill="#fff" stroke="#374151" stroke-width="1.5"/>
  <!-- Mittleres Fünfeck (schwarz) -->
  <polygon points="20,9 27,14 24,22 16,22 13,14" fill="#1f2937"/>
  <!-- Linien von den Fünfeck-Ecken zum Rand (Nähte) -->
  <line x1="20" y1="9" x2="20" y2="2" stroke="#1f2937" stroke-width="1.2"/>
  <line x1="27" y1="14" x2="35" y2="10" stroke="#1f2937" stroke-width="1.2"/>
  <line x1="24" y1="22" x2="32" y2="30" stroke="#1f2937" stroke-width="1.2"/>
  <line x1="16" y1="22" x2="8" y2="30" stroke="#1f2937" stroke-width="1.2"/>
  <line x1="13" y1="14" x2="5" y2="10" stroke="#1f2937" stroke-width="1.2"/>
</svg>
