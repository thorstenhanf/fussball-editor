<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64">
  <!-- Hallentor: breiter und höher als Minitor, mit Rückwand-Andeutung -->
  <rect x="8" y="8" width="64" height="52" fill="#f9fafb"/>
  <!-- Netz-Gitter vertikal -->
  <line x1="21" y1="8" x2="21" y2="60" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="34" y1="8" x2="34" y2="60" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="47" y1="8" x2="47" y2="60" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="60" y1="8" x2="60" y2="60" stroke="#d1d5db" stroke-width="0.8"/>
  <!-- Netz-Gitter horizontal -->
  <line x1="8" y1="21" x2="72" y2="21" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="8" y1="34" x2="72" y2="34" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="8" y1="47" x2="72" y2="47" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="8" y1="60" x2="72" y2="60" stroke="#d1d5db" stroke-width="0.8"/>
  <!-- Pfosten (kräftiger, da Hallentor aus Stahl/Alu) -->
  <rect x="4" y="4" width="4" height="56" fill="#9ca3af" stroke="#374151" stroke-width="1.2"/>
  <rect x="72" y="4" width="4" height="56" fill="#9ca3af" stroke="#374151" stroke-width="1.2"/>
  <rect x="4" y="4" width="72" height="4" fill="#9ca3af" stroke="#374151" stroke-width="1.2"/>
</svg>
