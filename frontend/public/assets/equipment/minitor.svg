<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 38">
  <!-- Netz-Hintergrund -->
  <rect x="6" y="6" width="44" height="28" fill="#f9fafb"/>
  <!-- Netz-Gitter vertikal -->
  <line x1="17" y1="6" x2="17" y2="34" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="28" y1="6" x2="28" y2="34" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="39" y1="6" x2="39" y2="34" stroke="#d1d5db" stroke-width="0.8"/>
  <!-- Netz-Gitter horizontal -->
  <line x1="6" y1="17" x2="50" y2="17" stroke="#d1d5db" stroke-width="0.8"/>
  <line x1="6" y1="28" x2="50" y2="28" stroke="#d1d5db" stroke-width="0.8"/>
  <!-- Pfosten -->
  <rect x="3" y="3" width="3" height="31" fill="#e5e7eb" stroke="#374151" stroke-width="1.2"/>
  <rect x="50" y="3" width="3" height="31" fill="#e5e7eb" stroke="#374151" stroke-width="1.2"/>
  <rect x="3" y="3" width="50" height="3" fill="#e5e7eb" stroke="#374151" stroke-width="1.2"/>
</svg>
