<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56">
  <!-- Trainer: graue Jacke (länger), lange Hose, neutrale Pose -->
  <circle cx="20" cy="7" r="6" fill="#f5d0a9" stroke="#374151" stroke-width="1.2"/>
  <!-- Lange Jacke (grau, reicht weiter runter) -->
  <path d="M13,14 L27,14 L25,35 L15,35 Z" fill="#6b7280" stroke="#374151" stroke-width="1"/>
  <!-- Revers-Linie zur Unterscheidung von Trikot -->
  <line x1="20" y1="14" x2="18" y2="22" stroke="#9ca3af" stroke-width="1"/>
  <!-- Jackenärmel -->
  <line x1="13" y1="17" x2="4" y2="28" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="17" x2="36" y2="28" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <!-- Hände -->
  <circle cx="4" cy="29" r="2" fill="#f5d0a9" stroke="#374151" stroke-width="0.8"/>
  <circle cx="36" cy="29" r="2" fill="#f5d0a9" stroke="#374151" stroke-width="0.8"/>
  <!-- Lange Hose (dunkelgrau) -->
  <line x1="17" y1="35" x2="14" y2="54" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="23" y1="35" x2="26" y2="54" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
</svg>
