<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56">
  <!-- Körper leicht nach vorne geneigt, Schussbewegung -->
  <circle cx="19" cy="7" r="6" fill="#f5d0a9" stroke="#374151" stroke-width="1.2"/>
  <path d="M13,14 L25,14 L23,31 L15,31 Z" fill="#2563eb" stroke="#374151" stroke-width="1"/>
  <!-- Arm links oben (Balance) -->
  <line x1="13" y1="17" x2="4" y2="11" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arm rechts unten -->
  <line x1="25" y1="17" x2="31" y2="24" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <rect x="14" y="31" width="10" height="6" rx="1" fill="#1f2937" stroke="#374151" stroke-width="0.8"/>
  <!-- Standbein links (gerade) -->
  <line x1="16" y1="37" x2="13" y2="54" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Schussbein rechts (ausgestreckt nach vorne/unten) -->
  <line x1="22" y1="37" x2="36" y2="48" stroke="#374151" stroke-width="2.2" stroke-linecap="round"/>
</svg>
