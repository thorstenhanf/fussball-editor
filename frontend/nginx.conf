server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-internen DNS nutzen, damit Hostnamen bei jedem Request neu aufgelöst
    # werden statt einmalig beim Start gecacht zu werden.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API-Anfragen intern an den Backend-Container weiterleiten.
    # Variable $upstream erzwingt die Nutzung des oben konfigurierten Resolvers –
    # ohne Variable würde nginx den Hostnamen nur einmal auflösen und cachen.
    location /api/ {
        set $upstream http://backend:4000;
        proxy_pass         $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA-Routing: alle anderen Pfade auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
