services:
  db:
    image: postgres:16-alpine
    container_name: sve-trainer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sve_trainer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: sve_trainer
    volumes:
      - sve_trainer_db_data:/var/lib/postgresql/data
    networks:
      - sve-trainer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sve_trainer -d sve_trainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: sve-trainer-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    networks:
      - sve-trainer-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sve-trainer-api.rule=Host(`${API_HOSTNAME:-trainer-api.example.de}`)"
      - "traefik.http.routers.sve-trainer-api.entrypoints=websecure"
      - "traefik.http.routers.sve-trainer-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.sve-trainer-api.loadbalancer.server.port=4000"

  frontend:
    build: ./frontend
    container_name: sve-trainer-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - sve-trainer-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sve-trainer-app.rule=Host(`${APP_HOSTNAME:-trainer.example.de}`)"
      - "traefik.http.routers.sve-trainer-app.entrypoints=websecure"
      - "traefik.http.routers.sve-trainer-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.sve-trainer-app.loadbalancer.server.port=80"

  redis:
    image: redis:7-alpine
    container_name: sve-trainer-redis
    restart: unless-stopped
    networks:
      - sve-trainer-net

  # worker:
  #   build: ./worker
  #   container_name: sve-trainer-worker
  #   restart: unless-stopped
  #   depends_on:
  #     - redis
  #   networks:
  #     - sve-trainer-net
  #   volumes:
  #     - sve_trainer_exports:/data/exports

networks:
  sve-trainer-net:
    driver: bridge

volumes:
  sve_trainer_db_data:
