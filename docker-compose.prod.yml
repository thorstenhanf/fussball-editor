services:
  db:
    image: postgres:16-alpine
    container_name: fussball-editor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sve_trainer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
      POSTGRES_DB: sve_trainer
    volumes:
      - fussball_editor_db_data:/var/lib/postgresql/data
    networks:
      - intern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sve_trainer -d sve_trainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: DOCKERHUB_USER/fussball-editor-backend:latest
    container_name: fussball-editor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - intern
    # Kein Port nach außen — nginx im Frontend-Container proxiert /api/ intern

  frontend:
    image: DOCKERHUB_USER/fussball-editor-frontend:latest
    container_name: fussball-editor-frontend
    restart: unless-stopped
    networks:
      - intern
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTP → HTTPS-Redirect
      - "traefik.http.routers.fussball-editor-http.rule=Host(`fussball-editor.xn--mller-tech-9db.de`)"
      - "traefik.http.routers.fussball-editor-http.entrypoints=web"
      - "traefik.http.routers.fussball-editor-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      # HTTPS
      - "traefik.http.routers.fussball-editor.rule=Host(`fussball-editor.xn--mller-tech-9db.de`)"
      - "traefik.http.routers.fussball-editor.entrypoints=websecure"
      - "traefik.http.routers.fussball-editor.tls.certresolver=letsencrypt"
      - "traefik.http.services.fussball-editor.loadbalancer.server.port=80"

  redis:
    image: redis:7-alpine
    container_name: fussball-editor-redis
    restart: unless-stopped
    networks:
      - intern

networks:
  intern:
    driver: bridge
  traefik-public:
    external: true

volumes:
  fussball_editor_db_data:
